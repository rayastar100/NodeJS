name: push-test

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "test.sh"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
      - "README.md"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test